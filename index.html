<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TryMyID - Online ID Card Editor</title>
    <!-- Massive Google Fonts Import for all requested typography -->
    <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans+Inline+One&family=Archivo+Black&family=Audiowide&family=Bungee+Inline&family=Jersey+20+Charted&family=Jersey+25+Charted&family=Libre+Barcode+39+Text&family=Lilita+One&family=Monoton&family=Paytone+One&family=Rowdies&family=Rubik+Broken+Fax&family=Rubik+Glitch+Pop&family=Rubik+Lines&family=Unbounded:wght@400;700;900&family=Wallpoet&family=Zen+Tokyo+Zoo&family=Orbitron:wght@700;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* HIG Color Palette (Dark Mode Default) */
            --bg-base: #000000;
            --bg-secondary: #1C1C1E; 
            --bg-tertiary: #2C2C2E; 
            --bg-quaternary: #3A3A3C;
            --label-primary: #FFFFFF;
            --label-secondary: #EBEBF599; 
            --separator: #38383A;
            --tint-blue: #0A84FF;
            --tint-blue-hover: #007AFF;
            
            /* ID Variables */
            --id-bg: url('https://raw.githubusercontent.com/SadatPro/img/refs/heads/main/NEW_ESRC_ID_CARD2.jpg');
            --id-bg-back: url('https://raw.githubusercontent.com/SadatPro/img/refs/heads/main/NEW_ESRC_BLANC_BACK_ID_CARD.jpg');
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-base);
            color: var(--label-primary);
            font-family: 'Stack Sans Notch', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 40px 0;
        }

        /* Glassmorphic Header */
        .header-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 15px 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            border-bottom: 0.5px solid var(--separator);
            margin-bottom: 30px;
        }

        .header-wrapper h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .header-wrapper span {
            color: var(--tint-blue);
        }

        .header-wrapper p {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            color: var(--label-secondary);
            font-weight: 400;
        }

        /* HIG Segmented Control for Tabs */
        .tabs-container {
            display: flex;
            background: var(--bg-secondary);
            padding: 3px;
            border-radius: 9px;
            margin-bottom: 30px;
            width: fit-content;
        }

        .tab-btn {
            background: transparent;
            color: var(--label-primary);
            border: none;
            padding: 6px 24px;
            border-radius: 7px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: -0.2px;
        }

        .tab-btn.active {
            background: #636366; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04);
            font-weight: 600;
        }

        .container {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            padding: 0 20px;
        }

        /* Settings Panel Structure */
        .controls {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .control-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .section-header {
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--label-secondary);
            padding: 0 16px 8px 16px;
            margin-top: -10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .input-group { 
            display: flex; 
            flex-direction: row; 
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--separator);
            gap: 15px;
        }
        
        .control-section .input-group:last-child { border-bottom: none; }

        .input-group.column-mode {
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        label { 
            font-family: 'Montserrat', sans-serif;
            font-size: 13px; 
            font-weight: 500; 
            color: var(--label-primary); 
            white-space: nowrap;
        }
        
        input[type="text"], select {
            width: 100%;
            max-width: 200px;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--label-primary);
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            text-align: right;
        }

        .column-mode input[type="text"], .column-mode select {
            max-width: 100%;
            text-align: left;
        }

        input[type="text"]:focus, select:focus { background: var(--bg-quaternary); }

        input[type="file"] { display: none; }
        .file-upload-btn {
            background: var(--bg-tertiary);
            color: var(--tint-blue);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            width: 100%;
            transition: background 0.2s;
        }
        .file-upload-btn:hover { background: var(--bg-quaternary); }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 16px;
            cursor: pointer;
            background: transparent;
            padding: 0;
            overflow: hidden;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid var(--separator); border-radius: 16px; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 20px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--bg-quaternary);
            border-radius: 2px;
        }

        .sliders-row {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary { 
            background: var(--tint-blue); 
            color: #ffffff; 
            margin-top: 10px;
        }
        .btn-primary:hover { 
            background: var(--tint-blue-hover); 
            transform: scale(0.98);
        }

        .tip {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            color: var(--label-secondary);
            margin-top: 4px;
            line-height: 1.4;
        }

        .tab-content { display: none; }
        .controls.tab-content.active { display: flex; flex-direction: column; }
        .preview-container.tab-content.active { display: flex; flex-direction: column; }

        .preview-container {
            flex: 1;
            min-width: 380px;
            align-items: center;
        }

        .id-card-wrapper {
            width: 100%;
            max-width: 420px;
            aspect-ratio: 600 / 960; 
            background-color: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            border-radius: 12px;
            transform: translateZ(0); 
        }

        /* --- MATHEMATICALLY SYNCED FRONT SIDE STYLES --- */
        .id-bg, .id-bg-back {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .id-bg { background-image: var(--id-bg); }
        .id-bg-back { background-image: var(--id-bg-back); }

        .id-photo-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 65.0%; 
            z-index: 2;
            overflow: hidden;
        }

        .id-photo {
            position: absolute;
            transform-origin: top left;
        }

        .id-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        .id-role {
            position: absolute;
            transform-origin: top left;
            white-space: nowrap;
            letter-spacing: 2px;
            line-height: 1;
        }

        .id-name {
            position: absolute;
            white-space: nowrap;
            letter-spacing: 1px;
            line-height: 1;
        }

        /* --- MATHEMATICALLY SYNCED BACK SIDE STYLES --- */
        .id-qr {
            position: absolute;
            box-sizing: content-box;
            z-index: 5;
        }

        .id-back-text {
            position: absolute;
            white-space: nowrap;
            z-index: 5;
            line-height: 1;
        }

        #render-canvas { display: none; }

        .preview-label {
            font-family: 'Montserrat', sans-serif;
            margin-top: 16px;
            font-size: 13px;
            color: var(--label-secondary);
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .controls { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <h1>TryMy<span>ID</span></h1>
        <p>Advanced ID Card Studio</p>
    </div>

    <div class="tabs-container">

        <button id="btn-back" class="tab-btn" onclick="switchTab('back')">Back Side</button>
    </div>

    <div class="container">
        <!-- Settings Panel: FRONT -->

            <!-- SECTION 1: ROLE CONTROLS -->

                            <option value="Libre Barcode 39 Text">Libre Barcode 39</option>
                            <option value="Wallpoet">Wallpoet</option>
                            <option value="Bungee Inline">Bungee Inline</option>

                            <option value="Zen Tokyo Zoo">Zen Tokyo Zoo</option>

                            <input type="range" id="roleOffsetXInp" min="-500" max="500" step="1" value="0" oninput="syncFront()">
                            <input type="range" id="roleOffsetYInp" min="-500" max="500" step="1" value="0" oninput="syncFront()">

                    </div>
                </div>
            </div>
            
            <!-- SECTION 2: NAME CONTROLS -->
            <div>
                <div class="section-header">Identity</div>
                <div class="control-section">
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" id="nameInp" value="SADAT MAHMUD" placeholder="Full Name" oninput="syncFront()">
                    </div>
                    <div class="input-group">
                        <label>Typography</label>
                        <select id="nameFontInp" onchange="syncFront()">
                            <option value="Archivo Black">Archivo Black</option>
                            <option value="Stack Sans Notch">Stack Sans Notch</option>
                            <option value="Unbounded">Unbounded</option>
                            <option value="Monoton">Monoton</option>
                            <option value="Audiowide">Audiowide</option>
                            <option value="Paytone One">Paytone One</option>
                            <option value="Rowdies">Rowdies</option>
                            <option value="Lilita One">Lilita One</option>
                            <option value="Arial Black">Black 900</option>
                            <option value="Libre Barcode 39 Text">Libre Barcode 39</option>
                            <option value="Wallpoet">Wallpoet</option>
                            <option value="Bungee Inline">Bungee Inline</option>
                            <option value="Alumni Sans Inline One">Alumni Sans</option>
                            <option value="Zen Tokyo Zoo">Zen Tokyo Zoo</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Text Color</label>
                        <input type="color" id="nameColorInp" value="#0a1172" oninput="syncFront()">
                    </div>
                    <div class="input-group column-mode">
                        <div class="sliders-row">
                            <div style="flex:1"><label style="font-size:11px;color:var(--label-secondary)">Scale</label></div>
                            <div style="flex:1"><label style="font-size:11px;color:var(--label-secondary)">X Axis</label></div>

            <button class="btn btn-primary" onclick="downloadIDCard('front')">Export Front Card</button>

        <!-- Settings Panel: BACK -->

    </div>

    <!-- Hidden canvas for rendering high quality image -->
    <canvas id="render-canvas"></canvas>

    <script>
        let userImg = null;
        let qrTimeout = null;
        
        // Base Canvas Dimensions 
        const CANVAS_W = 1200;
        const CANVAS_H = 1920;
        
        // Animation Frame References for buttery-smooth sliders
        let frontRAF = null;
        let backRAF = null;
        let qrZoomRAF = null;
        
        // Cached layout math to prevent DOM reflow thrashing during sliding
        let scaleRatioFront = 0;
        let scaleRatioBack = 0;

        // Image URLs
        const bgImgUrlFront = 'https://raw.githubusercontent.com/SadatPro/img/refs/heads/main/NEW_ESRC_ID_CARD2.jpg';
        const bgImgUrlBack = 'https://raw.githubusercontent.com/SadatPro/img/refs/heads/main/NEW_ESRC_BLANC_BACK_ID_CARD.jpg';

        const loadImage = (url) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error(`Failed to load image at ${url}`));
                img.src = url;
            });
        };

        function updateScaleRatios() {
            const wrapperFront = document.getElementById('capture-area-front');
            if (wrapperFront && wrapperFront.offsetWidth > 0) {
                scaleRatioFront = wrapperFront.offsetWidth / CANVAS_W;
            }
            const wrapperBack = document.getElementById('capture-area-back');
            if (wrapperBack && wrapperBack.offsetWidth > 0) {
                scaleRatioBack = wrapperBack.offsetWidth / CANVAS_W;
            }
        }

        function switchTab(side) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + side).classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById('controls-' + side).classList.add('active');
            document.getElementById('preview-' + side).classList.add('active');
            
            // Allow CSS to render the block before calculating offsetWidth
            setTimeout(() => {
                updateScaleRatios();
                if (side === 'front') _syncFront();
                if (side === 'back') _syncBack();
            }, 20);
        }

        function handleImg(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                userImg = new Image();
                userImg.onload = () => {
                    const photoEl = document.getElementById('viewPhoto');
                    photoEl.src = event.target.result;
                    photoEl.style.display = 'block';
                    syncFront(); 
                }
                userImg.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        // --- MATH SYNCHRONIZATION CORE ---
        // Using requestAnimationFrame wrappers to make sliders 60fps smooth
        function syncFront() {
            if (frontRAF) cancelAnimationFrame(frontRAF);
            frontRAF = requestAnimationFrame(_syncFront);
        }
        
        function syncBack() {
            if (backRAF) cancelAnimationFrame(backRAF);
            backRAF = requestAnimationFrame(_syncBack);
        }

        function updateQRZoom() {
            if (qrZoomRAF) cancelAnimationFrame(qrZoomRAF);
            qrZoomRAF = requestAnimationFrame(_updateQRZoom);
        }

        function _syncFront() {
            if (!scaleRatioFront) updateScaleRatios();
            const scaleRatio = scaleRatioFront;
            if (!scaleRatio) return;

            // Variables
            const nameText = document.getElementById('nameInp').value || "";
            const posText = document.getElementById('posInp').value || "";
            
            const nameEl = document.getElementById('viewName');
            const posEl = document.getElementById('viewPos');
            
            nameEl.innerText = nameText.toUpperCase();
            posEl.innerText = posText.toUpperCase();

            // Colors & Fonts
            const nameColor = document.getElementById('nameColorInp').value;
            const roleColor = document.getElementById('roleColorInp').value;
            nameEl.style.color = nameColor;
            posEl.style.color = roleColor;

            const nameFont = document.getElementById('nameFontInp').value;
            const roleFont = document.getElementById('roleFontInp').value;
            nameEl.style.fontFamily = `"${nameFont}", sans-serif`;
            posEl.style.fontFamily = `"${roleFont}", sans-serif`;
            
            nameEl.style.fontWeight = 'normal';
            posEl.style.fontWeight = 'normal';

            // Text Scaling Math
            const nameScale = parseFloat(document.getElementById('nameSizeInp').value) || 1.0;
            const roleScale = parseFloat(document.getElementById('roleSizeInp').value) || 1.0;
            
            const canvasNameSize = 60 * nameScale;
            const canvasRoleSize = 105 * roleScale; 
            
            nameEl.style.fontSize = `${canvasNameSize * scaleRatio}px`;
            posEl.style.fontSize = `${canvasRoleSize * scaleRatio}px`;

            // Text Offset Math
            const nameOffsetX = parseFloat(document.getElementById('nameOffsetXInp').value) || 0;
            const nameOffsetY = parseFloat(document.getElementById('nameOffsetYInp').value) || 0;
            const roleOffsetX = parseFloat(document.getElementById('roleOffsetXInp').value) || 0;
            const roleOffsetY = parseFloat(document.getElementById('roleOffsetYInp').value) || 0;

            // Positioning Name
            nameEl.style.left = `${(CANVAS_W * 0.61 + nameOffsetX) * scaleRatio}px`;
            nameEl.style.top = `${(CANVAS_H * 0.96 + nameOffsetY) * scaleRatio}px`;
            nameEl.style.transform = `translate(-50%, 0)`;

            // Positioning Role
            posEl.style.left = `${(CANVAS_W * 0.929 + roleOffsetX) * scaleRatio}px`;
            posEl.style.top = `${(CANVAS_H * 0.25 + roleOffsetY) * scaleRatio}px`;
            posEl.style.transform = `rotate(90deg)`;

            // Photo Mapping Math
            const photoEl = document.getElementById('viewPhoto');
            if(userImg && photoEl && photoEl.src) {
                const scale = parseFloat(document.getElementById('scaleInp').value) || 1.0;
                const offsetXPercent = parseFloat(document.getElementById('offsetXInp').value) || 0;
                const offsetYPercent = parseFloat(document.getElementById('offsetYInp').value) || 0;

                const clipHeight = CANVAS_H * 0.650; 
                const aspect = userImg.naturalWidth / userImg.naturalHeight;
                
                const baseTargetH = clipHeight;
                const baseTargetW = baseTargetH * aspect;

                const finalW = baseTargetW * scale;
                const finalH = baseTargetH * scale;

                const userOffsetXPixels = (offsetXPercent / 100) * baseTargetW;
                const canvasImgX = ((CANVAS_W - finalW) / 2) + userOffsetXPixels;
                
                const scaleOffset = baseTargetH - finalH; 
                const userOffsetYPixels = (offsetYPercent / 100) * baseTargetH;
                const canvasImgY = scaleOffset + userOffsetYPixels;

                photoEl.style.width = `${finalW * scaleRatio}px`;
                photoEl.style.height = `${finalH * scaleRatio}px`;
                photoEl.style.left = `${canvasImgX * scaleRatio}px`;
                photoEl.style.top = `${canvasImgY * scaleRatio}px`;
            }
        }

        function _syncBack() {
            if (!scaleRatioBack) updateScaleRatios();
            const scaleRatio = scaleRatioBack;
            if (!scaleRatio) return;

            document.getElementById('viewIdNum').innerText = "ID " + document.getElementById('idNumInp').value;
            document.getElementById('viewBlood').innerText = document.getElementById('bloodInp').value.toUpperCase();
            document.getElementById('viewPhone').innerText = "PHONE " + document.getElementById('phoneInp').value;
            document.getElementById('viewEmail').innerText = document.getElementById('emailInp').value.toUpperCase();

            const backFont = document.getElementById('backFontInp').value;
            const backColor = document.getElementById('backColorInp').value;
            
            // Adjusted Alignments specifically for the Blood Grouping typography fixes
            const textsToMap = [
                { id: 'viewIdNum',   yPct: 0.540, size: 50, weight: "bold" },
                { id: 'viewBloodLbl',yPct: 0.585, size: 40, weight: "normal" }, // Adjusted spacing
                { id: 'viewBlood',   yPct: 0.615, size: 75, weight: "bold" },   // Adjusted grouping layout
                { id: 'viewPhone',   yPct: 0.890, size: 50, weight: "bold" },
                { id: 'viewEmail',   yPct: 0.940, size: 42, weight: "bold" }
            ];

            textsToMap.forEach(t => {
                const el = document.getElementById(t.id);
                if (el) {
                    el.style.fontFamily = `"${backFont}", sans-serif`;
                    el.style.color = backColor;
                    el.style.fontWeight = t.weight;
                    
                    el.style.fontSize = `${t.size * scaleRatio}px`;
                    el.style.left = `${(CANVAS_W / 2) * scaleRatio}px`;
                    el.style.top = `${(CANVAS_H * t.yPct) * scaleRatio}px`;
                    el.style.transform = `translate(-50%, 0)`; 
                }
            });
            
            _updateQRZoom();
        }

        function _updateQRZoom() {
            if (!scaleRatioBack) updateScaleRatios();
            const scaleRatio = scaleRatioBack;
            if (!scaleRatio) return;

            const qrScale = parseFloat(document.getElementById('qrSizeInp').value) || 1.0;
            const baseQrSize = CANVAS_W * 0.40; 
            const qrSize = baseQrSize * qrScale;
            
            const originalCenterX = CANVAS_W / 2;
            const originalCenterY = (CANVAS_H * 0.25) + (baseQrSize / 2);
            
            const qrX = originalCenterX - (qrSize / 2);
            const qrY = originalCenterY - (qrSize / 2);
            const padding = 15 * qrScale;

            const qrEl = document.getElementById('viewQR');
            if (qrEl) {
                qrEl.style.width = `${qrSize * scaleRatio}px`;
                qrEl.style.height = `${qrSize * scaleRatio}px`;
                qrEl.style.left = `${qrX * scaleRatio}px`;
                qrEl.style.top = `${qrY * scaleRatio}px`;
                qrEl.style.padding = `${padding * scaleRatio}px`;
                qrEl.style.borderRadius = `${15 * scaleRatio}px`;
            }
        }

        function updateQR() {
            clearTimeout(qrTimeout);
            qrTimeout = setTimeout(() => {
                const data = document.getElementById('qrInp').value || "https://example.com/";
                const colorCode = document.getElementById('qrColorInp').value.replace('#', '');
                document.getElementById('viewQR').src = `https://quickchart.io/qr?size=400&text=${encodeURIComponent(data)}&dark=${colorCode}`;
            }, 500);
        }

        // Keep mappings responsive and fast
        window.addEventListener('resize', () => {
            updateScaleRatios();
            syncFront();
            syncBack();
        });

        // High-Res Render & Download
        async function downloadIDCard(side) {
            try {
                const rFont = document.getElementById('roleFontInp').value;
                const nFont = document.getElementById('nameFontInp').value;
                const bFont = document.getElementById('backFontInp').value;
                
                if (side === 'front') {
                    await document.fonts.load(`normal 10px "${rFont}"`);
                    await document.fonts.load(`normal 10px "${nFont}"`);
                } else {
                    await document.fonts.load(`normal 10px "${bFont}"`);
                    await document.fonts.load(`bold 10px "${bFont}"`);
                }
            } catch (e) {
                console.warn("Font Preload Issue: ", e);
            }
            await document.fonts.ready;

            const canvas = document.getElementById('render-canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = CANVAS_W;
            canvas.height = CANVAS_H;

            if (side === 'front') {
                const bg = await loadImage(bgImgUrlFront).catch(() => null);
                if (bg) {
                    ctx.drawImage(bg, 0, 0, CANVAS_W, CANVAS_H);
                } else {
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                }

                if (userImg) {
                    const scale = parseFloat(document.getElementById('scaleInp').value) || 1.0;
                    const offsetXPercent = parseFloat(document.getElementById('offsetXInp').value) || 0;
                    const offsetYPercent = parseFloat(document.getElementById('offsetYInp').value) || 0;

                    const clipHeight = CANVAS_H * 0.650; 

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(0, 0, CANVAS_W, clipHeight);
                    ctx.clip();

                    const aspect = userImg.naturalWidth / userImg.naturalHeight;
                    const baseTargetH = clipHeight;
                    const baseTargetW = baseTargetH * aspect;

                    const finalW = baseTargetW * scale;
                    const finalH = baseTargetH * scale;

                    const userOffsetXPixels = (offsetXPercent / 100) * baseTargetW;
                    const imgX = ((CANVAS_W - finalW) / 2) + userOffsetXPixels;
                    
                    const scaleOffset = baseTargetH - finalH; 
                    const userOffsetYPixels = (offsetYPercent / 100) * baseTargetH;
                    const imgY = scaleOffset + userOffsetYPixels;

                    ctx.drawImage(userImg, imgX, imgY, finalW, finalH);
                    ctx.restore(); 
                }

                // 3. Draw Vertical Position (Top to Bottom)
                const pos = document.getElementById('posInp').value.toUpperCase();
                if (pos) {
                    const roleFont = document.getElementById('roleFontInp').value;
                    const roleColor = document.getElementById('roleColorInp').value;
                    const roleScale = parseFloat(document.getElementById('roleSizeInp').value) || 1.0;
                    const roleOffsetX = parseFloat(document.getElementById('roleOffsetXInp').value) || 0;
                    const roleOffsetY = parseFloat(document.getElementById('roleOffsetYInp').value) || 0;
                    const canvasRoleSize = 105 * roleScale;

                    ctx.save();
                    ctx.translate((CANVAS_W * 0.929) + roleOffsetX, (CANVAS_H * 0.25) + roleOffsetY); 
                    ctx.rotate(Math.PI / 2); 
                    
                    ctx.fillStyle = roleColor;
                    ctx.font = `normal ${canvasRoleSize}px "${roleFont}", sans-serif`;
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'top'; 
                    ctx.letterSpacing = "2px"; 
                    
                    ctx.fillText(pos, 0, 0);
                    ctx.restore();
                }

                // 4. Draw Horizontal Name Text
                const name = document.getElementById('nameInp').value.toUpperCase();
                if (name) {
                    const nameFont = document.getElementById('nameFontInp').value;
                    const nameColor = document.getElementById('nameColorInp').value;
                    const nameScale = parseFloat(document.getElementById('nameSizeInp').value) || 1.0;
                    const nameOffsetX = parseFloat(document.getElementById('nameOffsetXInp').value) || 0;
                    const nameOffsetY = parseFloat(document.getElementById('nameOffsetYInp').value) || 0;
                    const canvasNameSize = 60 * nameScale;

                    ctx.save();
                    ctx.fillStyle = nameColor;
                    ctx.font = `normal ${canvasNameSize}px "${nameFont}", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top'; 
                    ctx.letterSpacing = "1px"; 
                    
                    ctx.fillText(name, (CANVAS_W * 0.61) + nameOffsetX, (CANVAS_H * 0.96) + nameOffsetY); 
                    ctx.restore();
                }
            } 
            else if (side === 'back') {
                const bg = await loadImage(bgImgUrlBack).catch(() => null);
                if (bg) {
                    ctx.drawImage(bg, 0, 0, CANVAS_W, CANVAS_H);
                } else {
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                }

                // 2. Draw QR Code
                const qrImgEl = document.getElementById('viewQR');
                if (qrImgEl && qrImgEl.src) {
                    const qrImg = await loadImage(qrImgEl.src).catch(() => null);
                    if (qrImg) {
                        const qrScale = parseFloat(document.getElementById('qrSizeInp').value) || 1.0;
                        const baseQrSize = CANVAS_W * 0.40; 
                        const qrSize = baseQrSize * qrScale;
                        
                        const originalCenterX = CANVAS_W / 2;
                        const originalCenterY = (CANVAS_H * 0.25) + (baseQrSize / 2);
                        
                        const qrX = originalCenterX - (qrSize / 2);
                        const qrY = originalCenterY - (qrSize / 2);
                        
                        ctx.fillStyle = "#ffffff";
                        const padding = 15 * qrScale;
                        
                        ctx.beginPath();
                        ctx.roundRect(qrX - padding, qrY - padding, qrSize + (padding * 2), qrSize + (padding * 2), 15);
                        ctx.fill();
                        
                        ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);
                    }
                }

                // 3. Draw Back Text
                const backFont = document.getElementById('backFontInp').value;
                const backColor = document.getElementById('backColorInp').value;

                ctx.fillStyle = backColor;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top'; 

                // Updated to use the synchronized alignment offsets
                ctx.font = `bold 50px "${backFont}", sans-serif`;
                ctx.fillText(document.getElementById('viewIdNum').innerText, CANVAS_W / 2, CANVAS_H * 0.540);

                ctx.font = `normal 40px "${backFont}", sans-serif`;
                ctx.fillText("BLOOD GROUP", CANVAS_W / 2, CANVAS_H * 0.585);

                ctx.font = `bold 75px "${backFont}", sans-serif`;
                ctx.fillText(document.getElementById('viewBlood').innerText, CANVAS_W / 2, CANVAS_H * 0.615);

                ctx.font = `bold 50px "${backFont}", sans-serif`;
                ctx.fillText(document.getElementById('viewPhone').innerText, CANVAS_W / 2, CANVAS_H * 0.890);

                ctx.font = `bold 42px "${backFont}", sans-serif`;
                ctx.fillText(document.getElementById('viewEmail').innerText, CANVAS_W / 2, CANVAS_H * 0.940);
            }

            const link = document.createElement('a');
            const safeName = document.getElementById('nameInp').value.replace(/[^a-z0-9]/gi, '_').toLowerCase() || 'id_card';
            link.download = `TryMyID_${safeName}_${side.toUpperCase()}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }

        window.onload = () => {
            updateScaleRatios();
            _syncFront();
            _syncBack();
        };
    </script>
</body>
</html>
